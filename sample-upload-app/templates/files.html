
{% extends "base.html" %}
{% block title %}S3 Bucket List{% endblock %}

{% block content %}
<div class="row">
      <div class="col-md-12">
        <div class="jumbotron">
          <form method="POST" action="/upload_files_to_s3" enctype="multipart/form-data">
          <p id="status">Please select a file</p>
          <input id="uploadImage" type="file" name="file" required onchange="PreviewImage()">
          <p></p><img id="uploadPreview" style="width: 200px; height: 200px;" /></p>
           <input type="submit" class="btn btn-danger">
          </form>
            <hr>
              <table class="table table-striped">
                <tr>
                    <th>Filenames</th>
                    <th>Last Modified</th>
                </tr>
                {% for f in files %}
                <tr>
                  <td>{{ f.Key }}</td>
                  <td>{{ f.LastModified }}</td>
                    <td>
                    <form class="delete-form" action="/delete_objects" method="POST">
                      <input type="hidden" name="key" value="{{ f.Key }}">
                      <button type="submit" class="btn btn-danger btn-sm" >Delete</button>
                  </td>
                  <td>
                    </form>
                    <form class="download-form" action="/download_objects" method="POST">
                      <input type="hidden" name="key" value="{{ f.Key }}">
                      <button type="submit" class="btn btn-default">Download</button>
                        <i class="fa fa-download"></i>
                      </button>
                    </form>
                  </td>
                </tr>
            {% endfor %}
          </table>
        </div>
      </div>
  </div>
  <div class="row">
  <div class="col-md-12">
    <div class="jumbotron">
    <p>
      {% for entry in entries %}
      <a href="{{entry.get('Full Name:').get('S')}}" class="btn btn-default">{{entry.get('Full Name:').get('S')}}</a>
      {% endfor %}
    </p>
    <hr>
  </div>
  </div>
  </div>
  <script type="text/javascript">

      function PreviewImage() {
          var oFReader = new FileReader();
          oFReader.readAsDataURL(document.getElementById("uploadImage").files[0]);

          oFReader.onload = function (oFREvent) {
              document.getElementById("uploadPreview").src = oFREvent.target.result;
          };
      };

  </script>
{% endblock %}
